services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile-aws
    platform: linux/amd64
    ports:
      - 8001:8000
    env_file:
      - ./app/.env.docker-aws
    depends_on:
      - db
  db:
    image: postgres:13.0-alpine
    volumes:
      - postgres_data_aws:/var/lib/postgresql/data/
    ports:
      - 5433:5432
    env_file:
      - ./app/.env.docker-aws

volumes:
  postgres_data_aws:
